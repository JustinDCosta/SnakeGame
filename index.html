<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Snake</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Outfit:wght@600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        
        <!-- Header Panel with Username, Scores, Colors -->
        <header class="game-header">
            <div class="header-top">
                <div class="player-profile">
                    <div class="avatar-icon">🎮</div>
                    <input type="text" id="username" class="username-input" placeholder="Player1" maxlength="12" spellcheck="false" autocomplete="off">
                </div>
                <div class="scoreboard">
                    <div class="score-card">
                        <span class="score-label">SCORE</span>
                        <span id="score" class="score-val">0</span>
                    </div>
                    <div class="score-card best">
                        <span class="score-label">BEST</span>
                        <span id="high-score" class="score-val">0</span>
                    </div>
                </div>
            </div>
            
            <div class="header-bottom">
                <div class="color-options" id="color-options">
                    <span class="color-label">Snake Color:</span>
                    <!-- Predefined color options -->
                    <button class="color-swatch active" data-color="#4a752c" style="background-color: #4a752c;"></button>
                    <button class="color-swatch" data-color="#2980b9" style="background-color: #2980b9;"></button>
                    <button class="color-swatch" data-color="#8e44ad" style="background-color: #8e44ad;"></button>
                    <button class="color-swatch" data-color="#e67e22" style="background-color: #e67e22;"></button>
                    <button class="color-swatch" data-color="#c0392b" style="background-color: #c0392b;"></button>
                </div>
                <button id="pause-btn" class="header-btn" disabled>⏸ Pause</button>
            </div>
        </header>

        <!-- Main Game Area -->
        <main id="canvas-container">
            <canvas id="game-canvas"></canvas>
            
            <!-- Start / Game Over Overlay -->
            <div id="ui-layer" class="active">
                <h1 id="ui-title">SNAKE</h1>
                <p class="hint">Press <strong>Space</strong> to Play</p>
                <button id="start-btn" class="action-btn">PLAY</button>
            </div>
            
            <!-- Pose Overlay -->
            <div id="pause-layer">
                <h1>PAUSED</h1>
                <p>Press <strong>Space</strong> to Resume</p>
            </div>
        </main>

        <!-- On-Screen Controls for Touch / Mobile -->
        <footer class="dpad-container">
            <div class="dpad-row">
                <button id="btn-up" class="dpad-btn" aria-label="Up">▲</button>
            </div>
            <div class="dpad-row">
                <button id="btn-left" class="dpad-btn" aria-label="Left">◀</button>
                <button id="btn-down" class="dpad-btn" aria-label="Down">▼</button>
                <button id="btn-right" class="dpad-btn" aria-label="Right">▶</button>
            </div>
        </footer>
    </div>
    <script src="game.js"></script>
</body>
</html>
